# Prism AI Code Reviewer — Full Local Development Stack
# Usage: docker compose up -d
#
# Services:
#   api         — FastAPI app (port 8000)
#   worker      — Celery background worker
#   postgres    — Audit trail database (port 5432)
#   redis       — Task broker + session cache (port 6379)
#   qdrant      — Vector database (port 6333)
#   prometheus  — Metrics collection (port 9090)
#   grafana     — Dashboards & visualization (port 3001)
#   redis-exporter   — Prometheus exporter for Redis (port 9121)
#   postgres-exporter — Prometheus exporter for PostgreSQL (port 9187)

services:
  # ── FastAPI Application ─────────────────────────────────────────────
  api:
    build: .
    container_name: prism-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://prism:prism@postgres:5432/prism
      - QDRANT_URL=http://qdrant:6333
      - PYTHONPATH=/app
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}
      - PROMETHEUS_PORT_API=9091
      - PROMETHEUS_PORT_WORKER=9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────────────────────────
  worker:
    build: .
    container_name: prism-worker
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://prism:prism@postgres:5432/prism
      - QDRANT_URL=http://qdrant:6333
      - PYTHONPATH=/app
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}
      - PROMETHEUS_PORT_API=9091
      - PROMETHEUS_PORT_WORKER=9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    ports:
      - "9092:9092"
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── PostgreSQL (Audit Trail) ────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: prism-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
      POSTGRES_DB: prism
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism -d prism"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (Celery Broker + Session Memory) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: prism-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # ── Qdrant (Vector Database) ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: prism-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Prometheus (Metrics Collection) ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prism-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"

  # ── Grafana (Dashboards & Visualization) ────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: prism-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: prism
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Enable service account API for DashboardService
      GF_AUTH_SERVICE_ACCOUNTS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── Redis Exporter (for Prometheus) ─────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: prism-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # ── PostgreSQL Exporter (for Prometheus) ────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: prism-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://prism:prism@postgres:5432/prism?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Ollama (Local LLM) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: prism-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama


volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  ollama_models:
    external: true
    name: distributed-search-py_ollama-data
