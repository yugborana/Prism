# GitHub Action: Create Prism Dashboard
#
# Triggered when a user comments on a PR with:
#   prism dashboard --create --name "Dashboard Name"
#   prism dashboard --create-all
# Or clicks the "Create" action in a dashboard suggestion comment.

name: Prism Dashboard Creation

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read
  issues: read

jobs:
  create-dashboard:
    if: >
      github.event.issue.pull_request &&
      (contains(github.event.comment.body, 'prism dashboard --create') ||
       contains(github.event.comment.body, 'DASHBOARD_CREATE'))
    runs-on: ubuntu-latest
    steps:
      - name: Get PR head ref
        id: pr_ref
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref', pr.data.head.ref);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_ref.outputs.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Parse Comment
        id: parse_comment
        run: |
          COMMENT="${{ github.event.comment.body }}"

          if [[ "$COMMENT" == *"prism dashboard --create --name"* ]]; then
            DASHBOARD_NAME=$(echo "$COMMENT" | sed -n 's/.*prism dashboard --create --name \(.*\)/\1/p')
            echo "command=specific" >> $GITHUB_OUTPUT
            echo "dashboard=$DASHBOARD_NAME" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" == *"DASHBOARD_CREATE"* ]]; then
            DASHBOARD_INFO=$(echo "$COMMENT" | grep -o 'DASHBOARD_CREATE:[^:]*:[^-]*' | head -1)
            DASHBOARD_TYPE=$(echo "$DASHBOARD_INFO" | cut -d ':' -f 2)
            DASHBOARD_NAME=$(echo "$DASHBOARD_INFO" | cut -d ':' -f 3)
            echo "command=from_comment" >> $GITHUB_OUTPUT
            echo "dashboard_type=$DASHBOARD_TYPE" >> $GITHUB_OUTPUT
            echo "dashboard=$DASHBOARD_NAME" >> $GITHUB_OUTPUT
          else
            echo "command=all" >> $GITHUB_OUTPUT
          fi

      - name: Create Dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
          DASHBOARD_NAME: ${{ steps.parse_comment.outputs.dashboard }}
          DASHBOARD_TYPE: ${{ steps.parse_comment.outputs.dashboard_type }}
          COMMAND_TYPE: ${{ steps.parse_comment.outputs.command }}
        run: |
          python -c "
          import asyncio, os, json
          from services.dashboard_service import DashboardService

          async def main():
              service = DashboardService()
              name = os.environ.get('DASHBOARD_NAME', 'Auto Dashboard')
              dash_type = os.environ.get('DASHBOARD_TYPE', 'grafana')

              suggestion = {
                  'name': name,
                  'type': dash_type,
                  'priority': 'High',
                  'queries': '[]',
                  'panels': '[]',
                  'alerts': '[]',
              }

              result = await service.create_dashboard(suggestion)
              print(json.dumps(result, indent=2))

          asyncio.run(main())
          "
        working-directory: backend
        continue-on-error: true

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          DASHBOARD_NAME: ${{ steps.parse_comment.outputs.dashboard }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const dashboardName = process.env.DASHBOARD_NAME || "all dashboards";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 Dashboard creation request received for: ${dashboardName}. Service implementation pending.`
            });
