# Prism CI/CD Pipeline
# Triggers on PR and push to main

name: Prism CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: backend
        run: |
          pip install ruff mypy
          pip install -e ".[dev]"
      - name: Ruff lint
        working-directory: backend
        run: ruff check .
      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .
      - name: Mypy type check
        working-directory: backend
        run: mypy . --ignore-missing-imports



  # ── Security Scan (Trivy) ──────────────────────────────────────────
  # Runs on every PR to catch vulnerabilities early — before merge.
  # Scans the filesystem (Dockerfile, IaC, dependencies) — no Docker build needed.
  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      # Scan filesystem: Dockerfile, Helm charts, Terraform, Python deps
      - name: Trivy filesystem scan (IaC + deps)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      # Note: Helm/K8s scan removed — migrated to EC2 + Docker Compose

  # ── Deploy to EC2 ─────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [lint, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: SSH deploy to EC2 and restart Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/prism
            git pull origin main
            docker compose build --no-cache fastapi celery celery-beat
            docker compose up -d --no-deps fastapi celery celery-beat
            docker compose ps
            
            # Simple health check
            sleep 10
            curl -f http://localhost:8000/api/health || { echo "Deployment failed health check"; exit 1; }
