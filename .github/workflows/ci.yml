# Prism CI/CD Pipeline
# Triggers on PR and push to main

name: Prism CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: prism-backend
  EKS_CLUSTER: prism-cluster

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: backend
        run: |
          pip install ruff mypy
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check backend/
      - name: Ruff format check
        run: ruff format --check backend/
      - name: Mypy type check
        run: mypy backend/ --ignore-missing-imports

  # ── Unit Tests ─────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: backend
        env:
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  # ── Build & Push Docker Image ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    outputs:
      ecr_registry: ${{ steps.ecr-login.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest backend/

      # ── Security Scan (runs BEFORE push — blocks vulnerable images) ──
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ── Deploy to EKS ─────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Deploy with Helm
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ needs.build.outputs.ecr_registry }}
        run: |
          helm upgrade --install prism infra/helm/prism \
            --set image.tag=$IMAGE_TAG \
            --set image.repository=$ECR_REGISTRY/$ECR_REPOSITORY \
            --namespace prism \
            --create-namespace \
            --wait --timeout 300s

      # ── Smoke Test + Rollback on Failure ────────────────────────────
      - name: Smoke test and rollback on failure
        run: |
          echo "Waiting for API rollout to complete..."
          kubectl rollout status deployment/prism-api -n prism --timeout=120s

          echo "Waiting for Worker rollout to complete..."
          kubectl rollout status deployment/prism-worker -n prism --timeout=120s

          echo "Running health check via port-forward..."
          kubectl port-forward svc/prism-api 8080:8000 -n prism &
          PF_PID=$!
          sleep 5

          curl -sf "http://localhost:8080/api/health" || {
            echo "Health check failed! Rolling back..."
            kill $PF_PID 2>/dev/null
            kubectl rollout undo deployment/prism-api -n prism
            kubectl rollout undo deployment/prism-worker -n prism
            exit 1
          }

          kill $PF_PID 2>/dev/null
          echo "✅ Deployment verified successfully"
