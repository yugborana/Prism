# Prism Alert Creation — Creates alert rules when triggered by PR comments
#
# Triggered when a user comments on a PR with:
#   prism alert --create --name "Alert Name"
#   prism alert --create-all
# Or clicks the "Create" action in an alert suggestion comment.

name: Prism Alert Creation

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: write
  issues: read
  repository-projects: write

jobs:
  create-alert:
    if: >
      github.event.issue.pull_request &&
      (contains(github.event.comment.body, 'prism alert --create') ||
       contains(github.event.comment.body, 'ALERT_CREATE'))
    runs-on: ubuntu-latest
    steps:
      - name: Get PR head ref
        id: pr_ref
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref', pr.data.head.ref);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_ref.outputs.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Parse Comment
        id: parse_comment
        run: |
          COMMENT="${{ github.event.comment.body }}"

          if [[ "$COMMENT" == *"prism alert --create --name"* ]]; then
            ALERT_NAME=$(echo "$COMMENT" | sed -n 's/.*prism alert --create --name \(.*\)/\1/p')
            echo "command=specific" >> $GITHUB_OUTPUT
            echo "alert=$ALERT_NAME" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" == *"ALERT_CREATE"* ]]; then
            ALERT_INFO=$(echo "$COMMENT" | grep -o 'ALERT_CREATE:[^:]*:[^-]*' | head -1)
            ALERT_TYPE=$(echo "$ALERT_INFO" | cut -d ':' -f 2)
            ALERT_NAME=$(echo "$ALERT_INFO" | cut -d ':' -f 3)
            echo "command=from_comment" >> $GITHUB_OUTPUT
            echo "alert_type=$ALERT_TYPE" >> $GITHUB_OUTPUT
            echo "alert=$ALERT_NAME" >> $GITHUB_OUTPUT
          else
            echo "command=all" >> $GITHUB_OUTPUT
          fi

      - name: Create Alert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
          ALERT_NAME: ${{ steps.parse_comment.outputs.alert }}
          ALERT_TYPE: ${{ steps.parse_comment.outputs.alert_type }}
          COMMAND_TYPE: ${{ steps.parse_comment.outputs.command }}
        run: |
          python -c "
          import asyncio, os, json
          from services.alert_service import AlertService

          async def main():
              service = AlertService()
              name = os.environ.get('ALERT_NAME', 'Auto Alert')
              alert_type = os.environ.get('ALERT_TYPE', 'prometheus')
              repo = '${{ github.repository }}'
              branch = '${{ steps.pr_ref.outputs.ref }}'

              suggestion = {
                  'name': name,
                  'type': alert_type,
                  'priority': 'P1',
                  'query': '',
                  'description': f'Auto-generated alert for {name}',
                  'threshold': '',
                  'duration': '5m',
                  'notification': '',
                  'runbook_link': '',
              }

              result = await service.create_alert(suggestion, repo, branch)
              print(json.dumps(result, indent=2))

          asyncio.run(main())
          "
        working-directory: backend
        continue-on-error: true

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          ALERT_NAME: ${{ steps.parse_comment.outputs.alert }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const alertName = process.env.ALERT_NAME || "all alerts";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚨 Alert creation request received for: ${alertName}. Service implementation pending.`
            });
