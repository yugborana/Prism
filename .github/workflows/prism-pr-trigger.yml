# Prism PR Trigger — Runs AI review automatically on every PR
# GitHub Action: Trigger Prism Review on Pull Request
#
# Triggers on PR open, synchronize (new commits pushed), or reopen.
# Calls Prism's review pipeline and posts results as PR comments.
#
# Two modes:
#   1. Deployed Backend (recommended): Set PRISM_API_URL as a repository
#      *variable* (not secret) and PRISM_API_KEY as a secret.
#      The workflow POSTs to the backend's /api/v1/webhooks/test-review
#      endpoint, which uses the full infrastructure (Celery, Postgres,
#      Qdrant, Prometheus).
#   2. Lightweight CI: If PRISM_API_URL is not set, falls back to running
#      the review pipeline inline (no Redis, no Postgres, no Qdrant).

name: Prism PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read
  issues: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Mode 1: Deployed Backend ──────────────────────────────────────
      - name: Trigger Review via Deployed Backend
        if: vars.PRISM_API_URL != ''
        env:
          PRISM_API_URL: ${{ vars.PRISM_API_URL }}
          PRISM_API_KEY: ${{ secrets.PRISM_API_KEY }}
        run: |
          echo "🔮 Triggering review via deployed Prism backend: $PRISM_API_URL"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$PRISM_API_URL/api/v1/webhooks/test-review" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $PRISM_API_KEY" \
            -d '{
              "repo": "${{ github.repository }}",
              "pr_number": ${{ github.event.pull_request.number }}
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response (HTTP $HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Review queued successfully on deployed backend"
          else
            echo "❌ Backend returned HTTP $HTTP_CODE"
            exit 1
          fi
        continue-on-error: true

      # ── Mode 2: Lightweight CI (fallback) ─────────────────────────────
      - name: Set up Python
        if: vars.PRISM_API_URL == ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: vars.PRISM_API_URL == ''
        run: pip install -e ".[dev]"

      - name: Run Prism Review (Lightweight CI)
        if: vars.PRISM_API_URL == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'groq' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -c "
          import asyncio
          from services.github_service import GitHubService
          from orchestrator.engine import ReviewOrchestrator

          async def main():
              gh = GitHubService()
              repo = '${{ github.repository }}'
              pr_number = ${{ github.event.pull_request.number }}

              # Fetch PR data
              diff = await gh.fetch_pr_diff(repo, pr_number)
              changed_files = await gh.fetch_pr_files(repo, pr_number)
              pr_details = await gh.fetch_pr_details(repo, pr_number)

              pr_data = {
                  'number': pr_number,
                  'repo_name': repo,
                  'title': pr_details.get('title', ''),
                  'body': pr_details.get('body', ''),
                  'changed_files': changed_files,
                  'diff': diff,
              }

              # Run review pipeline (no Celery — runs synchronously)
              orchestrator = ReviewOrchestrator(review_id=f'ci-pr-{pr_number}')
              state = await orchestrator.run_review(pr_data)

              # Post results
              if state.final_review:
                  await gh.post_review(repo, pr_number, state.final_review.model_dump())

          asyncio.run(main())
          "
        working-directory: backend
        continue-on-error: true
