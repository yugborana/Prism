# Prism Comment Trigger — Re-run review or trigger specific analysis via PR comments
#
# Supported commands (post as a PR comment):
#   prism check       — Re-run the full code review
#   prism dashboard   — Analyze and suggest dashboards
#   prism alerts      — Analyze and suggest alerts
#
# Two modes:
#   1. Deployed Backend: Set PRISM_API_URL as a repository *variable*
#      (not secret) and PRISM_API_KEY as a secret. POSTs to the backend API.
#   2. Lightweight CI: Fallback when PRISM_API_URL is not set. Runs inline.

name: Prism Comment Trigger

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read
  issues: read

jobs:
  analyze:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get PR Number
        id: get_pr_number
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      # ════════════════════════════════════════════════════════════════════
      # Mode 1: Deployed Backend — call the Prism API directly
      # ════════════════════════════════════════════════════════════════════

      - name: Trigger Check via Deployed Backend
        if: vars.PRISM_API_URL != '' && contains(github.event.comment.body, 'prism check')
        env:
          PRISM_API_URL: ${{ vars.PRISM_API_URL }}
          PRISM_API_KEY: ${{ secrets.PRISM_API_KEY }}
        run: |
          echo "🔮 Triggering 'prism check' via deployed backend"
          curl -sf -X POST "$PRISM_API_URL/api/v1/webhooks/test-review" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $PRISM_API_KEY" \
            -d '{"repo": "${{ github.repository }}", "pr_number": ${{ steps.get_pr_number.outputs.pr_number }}}'
          echo "✅ Review queued on deployed backend"
        continue-on-error: true

      - name: Trigger Dashboard via Deployed Backend
        if: vars.PRISM_API_URL != '' && contains(github.event.comment.body, 'prism dashboard')
        env:
          PRISM_API_URL: ${{ vars.PRISM_API_URL }}
          PRISM_API_KEY: ${{ secrets.PRISM_API_KEY }}
        run: |
          echo "📊 Triggering 'prism dashboard' via deployed backend"
          curl -sf -X POST "$PRISM_API_URL/api/v1/webhooks/test-review" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $PRISM_API_KEY" \
            -d '{"repo": "${{ github.repository }}", "pr_number": ${{ steps.get_pr_number.outputs.pr_number }}}'
          echo "✅ Dashboard analysis queued on deployed backend"
        continue-on-error: true

      - name: Trigger Alerts via Deployed Backend
        if: vars.PRISM_API_URL != '' && contains(github.event.comment.body, 'prism alerts')
        env:
          PRISM_API_URL: ${{ vars.PRISM_API_URL }}
          PRISM_API_KEY: ${{ secrets.PRISM_API_KEY }}
        run: |
          echo "🚨 Triggering 'prism alerts' via deployed backend"
          curl -sf -X POST "$PRISM_API_URL/api/v1/webhooks/test-review" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $PRISM_API_KEY" \
            -d '{"repo": "${{ github.repository }}", "pr_number": ${{ steps.get_pr_number.outputs.pr_number }}}'
          echo "✅ Alert analysis queued on deployed backend"
        continue-on-error: true

      # ════════════════════════════════════════════════════════════════════
      # Mode 2: Lightweight CI — inline Python (fallback)
      # ════════════════════════════════════════════════════════════════════

      - name: Set up Python
        if: vars.PRISM_API_URL == ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: vars.PRISM_API_URL == ''
        run: pip install -e ".[dev]"

      - name: Run Prism Check (Lightweight CI)
        if: vars.PRISM_API_URL == '' && contains(github.event.comment.body, 'prism check')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'groq' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -c "
          import asyncio
          from services.github_service import GitHubService
          from orchestrator.engine import ReviewOrchestrator

          async def main():
              gh = GitHubService()
              repo = '${{ github.repository }}'
              pr_number = ${{ steps.get_pr_number.outputs.pr_number }}

              diff = await gh.fetch_pr_diff(repo, pr_number)
              changed_files = await gh.fetch_pr_files(repo, pr_number)
              pr_details = await gh.fetch_pr_details(repo, pr_number)

              pr_data = {
                  'number': pr_number,
                  'repo_name': repo,
                  'title': pr_details.get('title', ''),
                  'body': pr_details.get('body', ''),
                  'changed_files': changed_files,
                  'diff': diff,
              }

              orchestrator = ReviewOrchestrator(review_id=f'comment-{pr_number}')
              state = await orchestrator.run_review(pr_data)

              if state.final_review:
                  await gh.post_review(repo, pr_number, state.final_review.model_dump())

          asyncio.run(main())
          "
        working-directory: backend
        continue-on-error: true

      - name: Run Prism Dashboard Analysis (Lightweight CI)
        if: vars.PRISM_API_URL == '' && contains(github.event.comment.body, 'prism dashboard')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'groq' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import asyncio
          from services.github_service import GitHubService
          from services.comment_service import CommentService
          from agents.dashboard_agent import DashboardAgent
          from agents.schemas import ReviewState

          async def main():
              gh = GitHubService()
              repo = '${{ github.repository }}'
              pr_number = ${{ steps.get_pr_number.outputs.pr_number }}

              diff = await gh.fetch_pr_diff(repo, pr_number)
              changed_files = await gh.fetch_pr_files(repo, pr_number)
              pr_details = await gh.fetch_pr_details(repo, pr_number)

              state = ReviewState(
                  pr_title=pr_details.get('title', ''),
                  pr_description=pr_details.get('body', ''),
                  repo_full_name=repo,
                  pr_number=pr_number,
                  changed_files=changed_files,
                  diff_data={'full_diff': diff},
              )

              agent = DashboardAgent()
              result = await agent.run(state)

              suggestions = result.get('suggestions', [])
              comment = CommentService()
              if suggestions:
                  await comment.post_dashboard_suggestions(repo, pr_number, suggestions)
              else:
                  await comment.post_summary_comment(repo, pr_number, '📊 No dashboard suggestions found for this PR.')

          asyncio.run(main())
          "
        working-directory: backend
        continue-on-error: true

      - name: Run Prism Alert Analysis (Lightweight CI)
        if: vars.PRISM_API_URL == '' && contains(github.event.comment.body, 'prism alerts')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'groq' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import asyncio
          from services.github_service import GitHubService
          from services.comment_service import CommentService
          from agents.alert_agent import AlertAgent
          from agents.schemas import ReviewState

          async def main():
              gh = GitHubService()
              repo = '${{ github.repository }}'
              pr_number = ${{ steps.get_pr_number.outputs.pr_number }}

              diff = await gh.fetch_pr_diff(repo, pr_number)
              changed_files = await gh.fetch_pr_files(repo, pr_number)
              pr_details = await gh.fetch_pr_details(repo, pr_number)

              state = ReviewState(
                  pr_title=pr_details.get('title', ''),
                  pr_description=pr_details.get('body', ''),
                  repo_full_name=repo,
                  pr_number=pr_number,
                  changed_files=changed_files,
                  diff_data={'full_diff': diff},
              )

              agent = AlertAgent()
              result = await agent.run(state)

              suggestions = result.get('suggestions', [])
              comment = CommentService()
              if suggestions:
                  await comment.post_alert_suggestions(repo, pr_number, suggestions)
              else:
                  await comment.post_summary_comment(repo, pr_number, '🚨 No alert suggestions found for this PR.')

          asyncio.run(main())
          "
        working-directory: backend
        continue-on-error: true
