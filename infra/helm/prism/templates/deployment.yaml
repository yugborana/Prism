apiVersion: apps/v1
kind: Deployment
metadata:
  name: prism-api
  labels:
    app: prism
    component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: prism
      component: api
  template:
    metadata:
      labels:
        app: prism
        component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: prism-config
            - secretRef:
                name: prism-secrets
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prism-worker
  labels:
    app: prism
    component: worker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: prism
      component: worker
  template:
    metadata:
      labels:
        app: prism
        component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["celery", "-A", "workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: prism-config
            - secretRef:
                name: prism-secrets
          resources:
            {{- toYaml .Values.resources.worker | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: prism-api
spec:
  selector:
    app: prism
    component: api
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
  type: {{ .Values.service.type }}
