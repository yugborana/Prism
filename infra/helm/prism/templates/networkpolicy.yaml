# Prism Network Policy
# Restricts pod-to-pod communication for defense in depth.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-network-policy
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from within the namespace (API ↔ Worker ↔ Redis ↔ Qdrant)
    - from:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 6333
    # Allow ingress controller / Cloudflare Tunnel to reach the API
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow within namespace
    - to:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}
    # Allow HTTPS outbound (GitHub API, LLM APIs)
    - to: []
      ports:
        - protocol: TCP
          port: 443
